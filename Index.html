<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#FF6B35"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Iron Log"/>
  <title>Iron Log</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#0D0D0F;overscroll-behavior:none;-webkit-tap-highlight-color:transparent;}
    input,select,textarea{-webkit-appearance:none;appearance:none;}
    select{background-image:none;}
    ::-webkit-scrollbar{display:none;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useCallback } = React;

const C = {
  bg:"#0D0D0F", surface:"#141418", card:"#1C1C22", border:"#2A2A35",
  iron:"#8B8FA8", chalk:"#E8EAF6", steel:"#4A4D6A",
  fire:"#FF6B35", fireDim:"#2A1A0F",
  gold:"#FFB800", goldDim:"#2A2000",
  green:"#3DDC84", greenDim:"#0D2A1A",
  blue:"#5B9CF6", red:"#FF4D4D",
};

const LIFT_MUSCLES = {
  "Bench Press":"Chest","Incline Bench":"Chest","Dips":"Chest","Cable Fly":"Chest",
  "Deadlift":"Back","Barbell Row":"Back","Pull-ups":"Back","Lat Pulldown":"Back",
  "Squat":"Legs","Leg Press":"Legs","Romanian Deadlift":"Legs",
  "Overhead Press":"Shoulders","Face Pull":"Shoulders",
  "Bicep Curl":"Arms","Tricep Pushdown":"Arms",
  "Custom":"Other",
};
const LIFT_EXERCISES = Object.keys(LIFT_MUSCLES);
const CARDIO_TYPES = ["Running","Cycling","Swimming","Rowing","Walking","HIIT","Other"];
const TYPE_COLOR = {
  "Bench Press":C.fire,"Incline Bench":C.fire,"Dips":C.fire,"Cable Fly":C.fire,
  "Deadlift":C.red,"Barbell Row":C.green,"Pull-ups":C.green,"Lat Pulldown":C.green,
  "Squat":C.gold,"Leg Press":C.gold,"Romanian Deadlift":C.gold,
  "Overhead Press":C.blue,"Face Pull":C.blue,
  "Bicep Curl":C.blue,"Tricep Pushdown":C.blue,
  "Custom":C.iron,
  "Running":"#A78BFA","Cycling":"#60A5FA","Swimming":"#34D399",
  "Rowing":"#5B9CF6","Walking":"#86EFAC","HIIT":C.red,"Other":C.iron,
};

const SK_W = "ironlog-workouts", SK_G = "ironlog-goals";
function load(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

function daysAgo(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().split("T")[0];}
function today(){return new Date().toISOString().split("T")[0];}

const SAMPLE_WORKOUTS=[
  {id:1,category:"lift",date:today(),duration:55,notes:"Chest day",
   sets:[{exercise:"Bench Press",reps:8,weight:225},{exercise:"Bench Press",reps:6,weight:235},{exercise:"Incline Bench",reps:10,weight:175},{exercise:"Cable Fly",reps:12,weight:65}]},
  {id:2,category:"lift",date:today(),duration:60,notes:"Leg day",
   sets:[{exercise:"Squat",reps:5,weight:315},{exercise:"Squat",reps:5,weight:315},{exercise:"Leg Press",reps:12,weight:450},{exercise:"Romanian Deadlift",reps:10,weight:200}]},
  {id:3,category:"lift",date:daysAgo(2),duration:65,notes:"Back felt strong",
   sets:[{exercise:"Deadlift",reps:5,weight:355},{exercise:"Barbell Row",reps:8,weight:200},{exercise:"Pull-ups",reps:10,weight:0},{exercise:"Lat Pulldown",reps:12,weight:155}]},
  {id:4,category:"cardio",date:daysAgo(3),duration:30,cardioType:"Running",distance:3.1,notes:"Easy 5k"},
  {id:5,category:"lift",date:daysAgo(4),duration:50,notes:"Shoulder day",
   sets:[{exercise:"Overhead Press",reps:8,weight:145},{exercise:"Overhead Press",reps:6,weight:155},{exercise:"Face Pull",reps:15,weight:55},{exercise:"Dips",reps:12,weight:0}]},
  {id:6,category:"lift",date:daysAgo(7),duration:55,notes:"Pull day",
   sets:[{exercise:"Deadlift",reps:5,weight:340},{exercise:"Barbell Row",reps:8,weight:185}]},
];
const SAMPLE_GOALS=[
  {id:1,type:"lift_pr",exercise:"Bench Press",target:275,unit:"lbs",label:"Bench 275 lbs"},
  {id:2,type:"lift_pr",exercise:"Squat",target:365,unit:"lbs",label:"Squat 365 lbs"},
  {id:3,type:"lift_pr",exercise:"Deadlift",target:405,unit:"lbs",label:"Deadlift 405 lbs"},
  {id:4,type:"sessions",exercise:"",target:16,unit:"sessions/month",label:"16 sessions this month"},
];

function calcPRs(workouts){
  const prs={};
  workouts.forEach(w=>{
    if(w.category!=="lift")return;
    (w.sets||[]).forEach(s=>{
      const e1rm=s.weight*(1+s.reps/30);
      if(!prs[s.exercise]||e1rm>prs[s.exercise].e1rm)
        prs[s.exercise]={weight:s.weight,reps:s.reps,e1rm:Math.round(e1rm),date:w.date};
    });
  });
  return prs;
}
function maxWeightByDate(workouts,exercise){
  const map={};
  workouts.forEach(w=>{
    if(w.category!=="lift")return;
    (w.sets||[]).forEach(s=>{
      if(s.exercise!==exercise)return;
      if(!map[w.date]||s.weight>map[w.date])map[w.date]=s.weight;
    });
  });
  return Object.entries(map).sort(([a],[b])=>a.localeCompare(b)).slice(-12);
}
function volumeByDate(workouts,exercise){
  const map={};
  workouts.forEach(w=>{
    if(w.category!=="lift")return;
    (w.sets||[]).forEach(s=>{
      if(s.exercise!==exercise)return;
      map[w.date]=(map[w.date]||0)+s.weight*s.reps;
    });
  });
  return Object.entries(map).sort(([a],[b])=>a.localeCompare(b)).slice(-12);
}
function sessionsThisMonth(workouts){
  const now=new Date();
  return workouts.filter(w=>{
    const d=new Date(w.date+"T00:00:00");
    return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  }).length;
}
function fmtDate(str){return new Date(str+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});}

function BarChart({data,color,yLabel}){
  if(!data.length)return <div style={{color:C.iron,fontSize:13,padding:"20px 0"}}>No data yet — log some sessions first.</div>;
  const max=Math.max(...data.map(([,v])=>v));
  return(
    <div>
      <div style={{display:"flex",alignItems:"flex-end",gap:5,height:90,marginBottom:6}}>
        {data.map(([date,val],i)=>(
          <div key={i} title={`${fmtDate(date)}: ${val}${yLabel}`}
            style={{flex:1,height:`${Math.max(5,(val/max)*82)}px`,background:color,borderRadius:"3px 3px 0 0",opacity:i===data.length-1?1:0.5,transition:"height 0.4s ease"}}/>
        ))}
      </div>
      <div style={{display:"flex",gap:5}}>
        {data.map(([date],i)=>(
          <div key={i} style={{flex:1,fontSize:9,color:C.steel,textAlign:"center"}}>
            {(i===0||i===data.length-1)?fmtDate(date):""}
          </div>
        ))}
      </div>
    </div>
  );
}

const inp={background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",color:C.chalk,fontSize:16,width:"100%",boxSizing:"border-box",fontFamily:"inherit",outline:"none"};
const lbl={fontSize:10,color:C.iron,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",display:"block",marginBottom:5};
const btn=(bg,fg,extra={})=>({background:bg,color:fg,border:"none",borderRadius:9,padding:"10px 18px",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit",...extra});

function SaveBadge({status}){
  if(status==="idle")return null;
  return <span style={{fontSize:11,color:status==="saved"?C.green:C.iron,fontWeight:600}}>{status==="saving"?"Saving…":"✓ Saved"}</span>;
}

function App(){
  const [workouts,setWorkoutsRaw]=useState(()=>load(SK_W,SAMPLE_WORKOUTS));
  const [goals,setGoalsRaw]=useState(()=>load(SK_G,SAMPLE_GOALS));
  const [saveStatus,setSaveStatus]=useState("idle");

  const setWorkouts=useCallback((updater)=>{
    setWorkoutsRaw(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      setSaveStatus("saving");save(SK_W,next);
      setTimeout(()=>setSaveStatus("saved"),300);
      setTimeout(()=>setSaveStatus("idle"),2200);
      return next;
    });
  },[]);
  const setGoals=useCallback((updater)=>{
    setGoalsRaw(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      setSaveStatus("saving");save(SK_G,next);
      setTimeout(()=>setSaveStatus("saved"),300);
      setTimeout(()=>setSaveStatus("idle"),2200);
      return next;
    });
  },[]);

  const [tab,setTab]=useState("log");
  const [modal,setModal]=useState(null);
  const [editId,setEditId]=useState(null);
  const [wCat,setWCat]=useState("lift");
  const [wDate,setWDate]=useState(today());
  const [wDuration,setWDuration]=useState("");
  const [wNotes,setWNotes]=useState("");
  const [wSets,setWSets]=useState([{exercise:"Bench Press",reps:"",weight:""}]);
  const [wCardioType,setWCardioType]=useState("Running");
  const [wDistance,setWDistance]=useState("");
  const [gType,setGType]=useState("lift_pr");
  const [gExercise,setGExercise]=useState("Bench Press");
  const [gTarget,setGTarget]=useState("");
  const [gLabel,setGLabel]=useState("");
  const [chartExercise,setChartExercise]=useState("Bench Press");
  const [chartMode,setChartMode]=useState("weight");

  const prs=useMemo(()=>calcPRs(workouts),[workouts]);
  const sortedWorkouts=useMemo(()=>[...workouts].sort((a,b)=>b.date.localeCompare(a.date)),[workouts]);

  function openAdd(ew=null){
    if(ew){
      setEditId(ew.id);setWCat(ew.category);setWDate(ew.date);
      setWDuration(String(ew.duration||""));setWNotes(ew.notes||"");
      if(ew.category==="lift"){setWSets(ew.sets.map(s=>({...s,reps:String(s.reps),weight:String(s.weight)})));}
      else{setWCardioType(ew.cardioType||"Running");setWDistance(String(ew.distance||""));}
    }else{
      setEditId(null);setWCat("lift");setWDate(today());
      setWDuration("");setWNotes("");
      setWSets([{exercise:"Bench Press",reps:"",weight:""}]);
      setWCardioType("Running");setWDistance("");
    }
    setModal("addWorkout");
  }

  function saveWorkout(){
    const base={date:wDate,duration:Number(wDuration)||0,notes:wNotes,category:wCat};
    let w;
    if(wCat==="lift"){
      const cs=wSets.filter(s=>s.reps&&s.weight!=="").map(s=>({exercise:s.exercise,reps:Number(s.reps),weight:Number(s.weight)}));
      if(!cs.length)return;
      w={...base,sets:cs};
    }else{w={...base,cardioType:wCardioType,distance:Number(wDistance)||0};}
    if(editId){setWorkouts(ws=>ws.map(x=>x.id===editId?{...w,id:editId}:x));}
    else{setWorkouts(ws=>[{...w,id:Date.now()},...ws]);}
    setModal(null);
  }

  function deleteWorkout(id){setWorkouts(ws=>ws.filter(w=>w.id!==id));}
  function saveGoal(){
    if(!gLabel||!gTarget)return;
    setGoals(gs=>[...gs,{id:Date.now(),type:gType,exercise:gType==="lift_pr"?gExercise:"",target:Number(gTarget),label:gLabel,unit:gType==="lift_pr"?"lbs":"sessions/month"}]);
    setGLabel("");setGTarget("");setModal(null);
  }
  function deleteGoal(id){setGoals(gs=>gs.filter(g=>g.id!==id));}
  function goalProgress(g){
    if(g.type==="lift_pr"){const pr=prs[g.exercise];const cur=pr?pr.weight:0;return{current:cur,pct:Math.min(100,Math.round((cur/g.target)*100))};}
    const cur=sessionsThisMonth(workouts);return{current:cur,pct:Math.min(100,Math.round((cur/g.target)*100))};
  }

  const chartData=chartMode==="weight"?maxWeightByDate(workouts,chartExercise):volumeByDate(workouts,chartExercise);
  const topPRs=Object.entries(prs).filter(([ex])=>LIFT_EXERCISES.includes(ex)).sort((a,b)=>b[1].e1rm-a[1].e1rm);
  const weekDays=Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(6-i));
    const ds=d.toISOString().split("T")[0];
    return{ds,day:["Su","Mo","Tu","We","Th","Fr","Sa"][d.getDay()],active:workouts.some(w=>w.date===ds)};
  });

  return(
    <div style={{minHeight:"100dvh",background:C.bg,color:C.chalk,fontFamily:"'Inter',system-ui,sans-serif",WebkitFontSmoothing:"antialiased"}}>

      {/* HEADER */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"16px 20px 0",position:"sticky",top:0,zIndex:50}}>
        <div style={{maxWidth:600,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,paddingTop:8}}>
            <div>
              <div style={{fontSize:10,letterSpacing:"0.2em",color:C.fire,fontWeight:800,textTransform:"uppercase"}}>IRON LOG</div>
              <div style={{fontSize:22,fontWeight:800,letterSpacing:"-0.03em",lineHeight:1.1}}>Training Tracker</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <SaveBadge status={saveStatus}/>
              <button onClick={()=>openAdd()} style={btn(C.fire,C.bg,{fontSize:13,padding:"9px 16px",borderRadius:10})}>+ Log Session</button>
            </div>
          </div>
          <div style={{display:"flex",gap:5,marginBottom:12}}>
            {weekDays.map(({ds,day,active})=>(
              <div key={ds} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                <div style={{width:30,height:30,borderRadius:7,background:active?C.fire:C.card,border:`1px solid ${active?C.fire:C.border}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {active&&<div style={{width:7,height:7,borderRadius:"50%",background:C.bg}}/>}
                </div>
                <div style={{fontSize:9,color:active?C.fire:C.steel,fontWeight:active?700:400}}>{day}</div>
              </div>
            ))}
          </div>
          <div style={{display:"flex"}}>
            {[["log","Log"],["records","PRs"],["charts","Charts"],["goals","Goals"]].map(([key,label])=>(
              <button key={key} onClick={()=>setTab(key)}
                style={{background:"none",border:"none",color:tab===key?C.fire:C.iron,fontWeight:tab===key?700:500,fontSize:13,padding:"8px 14px",cursor:"pointer",borderBottom:`2px solid ${tab===key?C.fire:"transparent"}`,transition:"all 0.15s",fontFamily:"inherit"}}>
                {label}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:600,margin:"0 auto",padding:"20px 16px 100px"}}>

        {/* LOG TAB */}
        {tab==="log"&&(
          <div>
            <div style={{display:"flex",gap:10,marginBottom:24}}>
              {[
                {label:"This Month",value:sessionsThisMonth(workouts),unit:"sessions",color:C.fire},
                {label:"Total Volume",value:(()=>{const t=workouts.filter(w=>w.category==="lift").reduce((s,w)=>s+(w.sets||[]).reduce((a,s)=>a+s.weight*s.reps,0),0);return t>=1000000?(t/1000000).toFixed(1)+"M":t>=1000?(t/1000).toFixed(0)+"K":t;})(),unit:"lbs",color:C.gold},
                {label:"PR Lifts",value:Object.keys(prs).length,unit:"tracked",color:C.green},
              ].map(({label,value,unit,color})=>(
                <div key={label} style={{flex:1,background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 12px"}}>
                  <div style={{fontSize:9,color:C.iron,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:4}}>{label}</div>
                  <div style={{fontSize:22,fontWeight:800,color,lineHeight:1}}>{value}<span style={{fontSize:11,color:C.iron,fontWeight:500,marginLeft:3}}>{unit}</span></div>
                </div>
              ))}
            </div>
            {sortedWorkouts.length===0&&(
              <div style={{textAlign:"center",padding:"60px 0",color:C.iron}}>
                <div style={{fontSize:40,marginBottom:12}}>🏋️</div>
                <div style={{fontSize:16,fontWeight:700}}>No sessions yet</div>
                <div style={{fontSize:13,marginTop:6}}>Tap "+ Log Session" to get started</div>
              </div>
            )}
            {sortedWorkouts.map((w,i)=>{
              const showHeader=i===0||sortedWorkouts[i-1].date!==w.date;
              const isLift=w.category==="lift";
              const totalVol=isLift?(w.sets||[]).reduce((s,set)=>s+set.weight*set.reps,0):0;
              const exercises=isLift?[...new Set((w.sets||[]).map(s=>s.exercise))]:[];
              return(
                <div key={w.id}>
                  {showHeader&&(
                    <div style={{fontSize:10,color:C.iron,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",margin:`${i===0?0:18}px 0 8px`}}>
                      {w.date===today()?"Today":fmtDate(w.date)}
                    </div>
                  )}
                  <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,marginBottom:10}}>
                    <div style={{padding:"14px 16px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                        <div style={{flex:1}}>
                          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                            <div style={{fontSize:11,fontWeight:700,color:isLift?C.fire:"#A78BFA",letterSpacing:"0.1em",textTransform:"uppercase"}}>
                              {isLift?"Weightlifting":w.cardioType}
                            </div>
                            {w.duration>0&&<div style={{fontSize:11,color:C.iron}}>{w.duration} min</div>}
                          </div>
                          {isLift?(
                            <>
                              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>
                                {exercises.map(ex=>(
                                  <span key={ex} style={{fontSize:12,background:C.card,border:`1px solid ${C.border}`,borderRadius:6,padding:"2px 8px",color:TYPE_COLOR[ex]||C.iron,fontWeight:600}}>{ex}</span>
                                ))}
                              </div>
                              <div style={{display:"flex",gap:16}}>
                                <span style={{fontSize:13,color:C.iron}}><span style={{color:C.chalk,fontWeight:600}}>{(w.sets||[]).length}</span> sets</span>
                                <span style={{fontSize:13,color:C.iron}}><span style={{color:C.gold,fontWeight:600}}>{totalVol.toLocaleString()}</span> lbs vol</span>
                              </div>
                            </>
                          ):(
                            <div style={{display:"flex",gap:16}}>
                              {w.distance>0&&<span style={{fontSize:13,color:C.iron}}><span style={{color:C.chalk,fontWeight:600}}>{w.distance}</span> mi</span>}
                            </div>
                          )}
                          {w.notes?<div style={{fontSize:12,color:C.iron,marginTop:8,fontStyle:"italic"}}>{w.notes}</div>:null}
                        </div>
                        <div style={{display:"flex",gap:4,marginLeft:8}}>
                          <button onClick={()=>openAdd(w)} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:7,color:C.iron,cursor:"pointer",padding:"5px 9px",fontSize:12}}>Edit</button>
                          <button onClick={()=>deleteWorkout(w.id)} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:7,color:C.iron,cursor:"pointer",padding:"5px 9px",fontSize:12}}>✕</button>
                        </div>
                      </div>
                      {isLift&&(
                        <div style={{marginTop:10,background:C.card,borderRadius:8,padding:"10px 12px"}}>
                          {(w.sets||[]).map((s,si)=>(
                            <div key={si} style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:si<w.sets.length-1?5:0}}>
                              <span style={{color:TYPE_COLOR[s.exercise]||C.iron,fontWeight:600}}>{s.exercise}</span>
                              <span style={{color:C.iron}}>{s.reps} × <span style={{color:C.chalk,fontWeight:700}}>{s.weight>0?s.weight+" lbs":"BW"}</span></span>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* PRs TAB */}
        {tab==="records"&&(
          <div>
            <div style={{fontSize:10,color:C.iron,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:14}}>The Big Three</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:24}}>
              {["Bench Press","Squat","Deadlift"].map(ex=>{
                const pr=prs[ex];
                return(
                  <div key={ex} style={{background:C.card,border:`1px solid ${pr?C.gold:C.border}`,borderRadius:12,padding:"14px 10px",textAlign:"center"}}>
                    <div style={{fontSize:9,color:C.iron,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6}}>{ex}</div>
                    {pr?(
                      <>
                        <div style={{fontSize:24,fontWeight:900,color:C.gold,lineHeight:1}}>{pr.weight}<span style={{fontSize:11,fontWeight:500,color:C.iron}}>lbs</span></div>
                        <div style={{fontSize:10,color:C.iron,marginTop:4}}>{pr.reps} reps · {fmtDate(pr.date)}</div>
                      </>
                    ):<div style={{fontSize:12,color:C.steel,marginTop:8}}>No data</div>}
                  </div>
                );
              })}
            </div>
            <div style={{fontSize:10,color:C.iron,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:12}}>All Exercises</div>
            {topPRs.map(([ex,pr])=>(
              <div key={ex} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 16px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:14,fontWeight:700,color:TYPE_COLOR[ex]||C.chalk}}>{ex}</div>
                  <div style={{fontSize:11,color:C.iron,marginTop:2}}>{LIFT_MUSCLES[ex]} · {fmtDate(pr.date)}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:18,fontWeight:800,color:C.gold}}>{pr.weight}<span style={{fontSize:11,color:C.iron,marginLeft:2}}>lbs</span></div>
                  <div style={{fontSize:11,color:C.iron}}>{pr.reps} reps · e1RM {pr.e1rm} lbs</div>
                </div>
              </div>
            ))}
            {topPRs.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:C.iron,fontSize:13}}>Log weightlifting sessions to see your PRs</div>}
          </div>
        )}

        {/* CHARTS TAB */}
        {tab==="charts"&&(
          <div>
            <div style={{marginBottom:16}}>
              <div style={lbl}>Exercise</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {LIFT_EXERCISES.filter(ex=>workouts.some(w=>w.category==="lift"&&(w.sets||[]).some(s=>s.exercise===ex))).map(ex=>(
                  <button key={ex} onClick={()=>setChartExercise(ex)}
                    style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${chartExercise===ex?(TYPE_COLOR[ex]||C.fire):C.border}`,background:chartExercise===ex?(TYPE_COLOR[ex]||C.fire)+"22":"transparent",color:chartExercise===ex?(TYPE_COLOR[ex]||C.fire):C.iron,fontWeight:chartExercise===ex?700:500,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
                    {ex}
                  </button>
                ))}
              </div>
            </div>
            <div style={{display:"flex",gap:6,marginBottom:16}}>
              {[["weight","Max Weight"],["volume","Volume"]].map(([m,label])=>(
                <button key={m} onClick={()=>setChartMode(m)}
                  style={{padding:"6px 14px",borderRadius:8,border:`1px solid ${chartMode===m?C.fire:C.border}`,background:chartMode===m?C.fireDim:"transparent",color:chartMode===m?C.fire:C.iron,fontWeight:chartMode===m?700:500,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
                  {label}
                </button>
              ))}
            </div>
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:"18px 18px 12px",marginBottom:16}}>
              <div style={{fontSize:14,fontWeight:700,color:TYPE_COLOR[chartExercise]||C.fire,marginBottom:2}}>{chartExercise}</div>
              <div style={{fontSize:11,color:C.iron,marginBottom:14}}>{chartMode==="weight"?"Heaviest set per session (lbs)":"Total volume per session (lbs × reps)"}</div>
              <BarChart data={chartData} color={TYPE_COLOR[chartExercise]||C.fire} yLabel=" lbs"/>
            </div>
            {prs[chartExercise]&&(
              <div style={{background:C.goldDim,border:`1px solid ${C.gold}`,borderRadius:12,padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                <div>
                  <div style={{fontSize:10,color:C.gold,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:4}}>🏆 Personal Record</div>
                  <div style={{fontSize:13,color:C.chalk}}>{prs[chartExercise].reps} reps @ {prs[chartExercise].weight} lbs · {fmtDate(prs[chartExercise].date)}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:26,fontWeight:900,color:C.gold,lineHeight:1}}>{prs[chartExercise].e1rm}</div>
                  <div style={{fontSize:10,color:C.iron}}>e1RM lbs</div>
                </div>
              </div>
            )}
            {workouts.some(w=>w.category==="cardio"&&w.distance)&&(
              <>
                <div style={{fontSize:10,color:C.iron,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:12}}>Cardio Distance</div>
                <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:"18px 18px 12px"}}>
                  <BarChart data={Object.entries(workouts.filter(w=>w.category==="cardio"&&w.distance).reduce((m,w)=>{m[w.date]=(m[w.date]||0)+w.distance;return m;},{})).sort(([a],[b])=>a.localeCompare(b)).slice(-12)} color="#A78BFA" yLabel=" mi"/>
                </div>
              </>
            )}
          </div>
        )}

        {/* GOALS TAB */}
        {tab==="goals"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <div style={{fontSize:10,color:C.iron,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase"}}>Your Goals</div>
              <button onClick={()=>setModal("addGoal")} style={btn(C.card,C.chalk,{fontSize:12,padding:"7px 14px",border:`1px solid ${C.border}`})}>+ Add Goal</button>
            </div>
            {goals.map(g=>{
              const{current,pct}=goalProgress(g);const done=pct>=100;
              return(
                <div key={g.id} style={{background:C.surface,border:`1px solid ${done?C.green:C.border}`,borderRadius:14,padding:"16px 18px",marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                        {done&&<span>🏆</span>}
                        <div style={{fontSize:15,fontWeight:700,color:done?C.green:C.chalk}}>{g.label}</div>
                      </div>
                      <div style={{fontSize:11,color:C.iron}}>
                        {g.type==="lift_pr"?`Current PR: ${current} lbs → Target: ${g.target} lbs`:`This month: ${current} → Target: ${g.target} sessions`}
                      </div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{fontSize:20,fontWeight:900,color:done?C.green:C.fire}}>{pct}%</div>
                      <button onClick={()=>deleteGoal(g.id)} style={{background:"none",border:"none",color:C.iron,cursor:"pointer",fontSize:14}}>✕</button>
                    </div>
                  </div>
                  <div style={{background:C.card,borderRadius:4,height:6,overflow:"hidden"}}>
                    <div style={{background:done?C.green:C.fire,width:`${pct}%`,height:"100%",borderRadius:4,transition:"width 0.6s ease"}}/>
                  </div>
                </div>
              );
            })}
            {goals.length===0&&<div style={{textAlign:"center",padding:"50px 0",color:C.iron,fontSize:13}}>Set a goal to track your progress</div>}
          </div>
        )}
      </div>

      {/* MODAL */}
      {modal&&(
        <div onClick={()=>setModal(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:"20px 20px 0 0",padding:24,paddingBottom:"calc(24px + env(safe-area-inset-bottom,0px))",width:"100%",maxWidth:600,maxHeight:"90dvh",overflowY:"auto"}}>

            {modal==="addWorkout"&&(
              <div>
                <div style={{fontSize:17,fontWeight:800,marginBottom:20}}>{editId?"Edit Session":"Log Session"}</div>
                <div style={{marginBottom:16}}>
                  <div style={lbl}>Type</div>
                  <div style={{display:"flex",gap:8}}>
                    {[["lift","🏋️ Weights"],["cardio","🏃 Cardio"]].map(([cat,label])=>(
                      <button key={cat} onClick={()=>setWCat(cat)}
                        style={{flex:1,padding:"10px",borderRadius:9,border:`1px solid ${wCat===cat?C.fire:C.border}`,background:wCat===cat?C.fireDim:C.card,color:wCat===cat?C.fire:C.iron,fontWeight:wCat===cat?700:500,fontSize:15,cursor:"pointer",fontFamily:"inherit"}}>
                        {label}
                      </button>
                    ))}
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
                  <div><div style={lbl}>Date</div><input type="date" value={wDate} onChange={e=>setWDate(e.target.value)} style={inp}/></div>
                  <div><div style={lbl}>Duration (min)</div><input type="number" inputMode="numeric" placeholder="60" value={wDuration} onChange={e=>setWDuration(e.target.value)} style={inp}/></div>
                </div>
                {wCat==="lift"&&(
                  <div style={{marginBottom:16}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                      <div style={lbl}>Sets</div>
                      <button onClick={()=>setWSets(s=>[...s,{exercise:wSets[wSets.length-1]?.exercise||"Bench Press",reps:"",weight:""}])}
                        style={btn(C.card,C.iron,{padding:"5px 12px",fontSize:13,border:`1px solid ${C.border}`})}>+ Set</button>
                    </div>
                    {wSets.map((s,i)=>(
                      <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr auto",gap:8,marginBottom:10,alignItems:"center"}}>
                        <select value={s.exercise} onChange={e=>setWSets(ss=>ss.map((x,j)=>j===i?{...x,exercise:e.target.value}:x))} style={{...inp,padding:"8px 10px"}}>
                          <optgroup label="── Chest ──">{["Bench Press","Incline Bench","Dips","Cable Fly"].map(ex=><option key={ex}>{ex}</option>)}</optgroup>
                          <optgroup label="── Back ──">{["Deadlift","Barbell Row","Pull-ups","Lat Pulldown"].map(ex=><option key={ex}>{ex}</option>)}</optgroup>
                          <optgroup label="── Legs ──">{["Squat","Leg Press","Romanian Deadlift"].map(ex=><option key={ex}>{ex}</option>)}</optgroup>
                          <optgroup label="── Shoulders ──">{["Overhead Press","Face Pull"].map(ex=><option key={ex}>{ex}</option>)}</optgroup>
                          <optgroup label="── Arms ──">{["Bicep Curl","Tricep Pushdown"].map(ex=><option key={ex}>{ex}</option>)}</optgroup>
                          <option value="Custom">Custom</option>
                        </select>
                        <input type="number" inputMode="numeric" placeholder="Reps" value={s.reps} onChange={e=>setWSets(ss=>ss.map((x,j)=>j===i?{...x,reps:e.target.value}:x))} style={{...inp,padding:"8px 8px"}}/>
                        <input type="number" inputMode="decimal" placeholder="lbs" value={s.weight} onChange={e=>setWSets(ss=>ss.map((x,j)=>j===i?{...x,weight:e.target.value}:x))} style={{...inp,padding:"8px 8px"}}/>
                        <button onClick={()=>setWSets(ss=>ss.filter((_,j)=>j!==i))} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:7,color:C.iron,cursor:"pointer",padding:"8px 10px",fontSize:14}}>✕</button>
                      </div>
                    ))}
                  </div>
                )}
                {wCat==="cardio"&&(
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
                    <div><div style={lbl}>Activity</div>
                      <select value={wCardioType} onChange={e=>setWCardioType(e.target.value)} style={{...inp,padding:"9px 12px"}}>
                        {CARDIO_TYPES.map(t=><option key={t}>{t}</option>)}
                      </select>
                    </div>
                    <div><div style={lbl}>Distance (mi)</div><input type="number" inputMode="decimal" step="0.1" placeholder="3.1" value={wDistance} onChange={e=>setWDistance(e.target.value)} style={inp}/></div>
                  </div>
                )}
                <div style={{marginBottom:20}}>
                  <div style={lbl}>Notes <span style={{color:C.steel,fontWeight:400}}>(optional)</span></div>
                  <textarea placeholder="How did the session go?" value={wNotes} onChange={e=>setWNotes(e.target.value)} rows={2} style={{...inp,resize:"none"}}/>
                </div>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={saveWorkout} style={btn(C.fire,C.bg,{flex:1,padding:"13px",fontSize:15})}>{editId?"Save Changes":"Save Session"}</button>
                  <button onClick={()=>setModal(null)} style={btn(C.card,C.iron,{padding:"13px 20px",border:`1px solid ${C.border}`})}>Cancel</button>
                </div>
              </div>
            )}

            {modal==="addGoal"&&(
              <div>
                <div style={{fontSize:17,fontWeight:800,marginBottom:20}}>New Goal</div>
                <div style={{marginBottom:16}}>
                  <div style={lbl}>Goal Type</div>
                  <div style={{display:"flex",gap:8}}>
                    {[["lift_pr","🏋️ Lift PR"],["sessions","📅 Sessions"]].map(([t,label])=>(
                      <button key={t} onClick={()=>setGType(t)}
                        style={{flex:1,padding:"10px",borderRadius:9,border:`1px solid ${gType===t?C.fire:C.border}`,background:gType===t?C.fireDim:C.card,color:gType===t?C.fire:C.iron,fontWeight:gType===t?700:500,fontSize:15,cursor:"pointer",fontFamily:"inherit"}}>
                        {label}
                      </button>
                    ))}
                  </div>
                </div>
                {gType==="lift_pr"&&(
                  <div style={{marginBottom:14}}>
                    <div style={lbl}>Exercise</div>
                    <select value={gExercise} onChange={e=>setGExercise(e.target.value)} style={{...inp,padding:"9px 12px"}}>
                      {LIFT_EXERCISES.map(ex=><option key={ex}>{ex}</option>)}
                    </select>
                  </div>
                )}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
                  <div><div style={lbl}>Target {gType==="lift_pr"?"(lbs)":"(sessions)"}</div><input type="number" inputMode="numeric" placeholder={gType==="lift_pr"?"275":"16"} value={gTarget} onChange={e=>setGTarget(e.target.value)} style={inp}/></div>
                  <div><div style={lbl}>Label</div><input placeholder={gType==="lift_pr"?"Bench 275 lbs":"16 sessions/mo"} value={gLabel} onChange={e=>setGLabel(e.target.value)} style={inp}/></div>
                </div>
                <div style={{display:"flex",gap:10,marginTop:20}}>
                  <button onClick={saveGoal} disabled={!gTarget||!gLabel}
                    style={btn(C.fire,C.bg,{flex:1,padding:"13px",fontSize:15,opacity:(!gTarget||!gLabel)?0.4:1})}>Add Goal</button>
                  <button onClick={()=>setModal(null)} style={btn(C.card,C.iron,{padding:"13px 20px",border:`1px solid ${C.border}`})}>Cancel</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
