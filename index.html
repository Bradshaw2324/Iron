const C = {...THEMES.dark};
function applyTheme(name){
  const t=THEMES[name];
  Object.keys(t).forEach(k=>{C[k]=t[k];});
}

const BASE_LIFT_MUSCLES = {
  "Bench Press":"Chest","Incline Bench":"Chest","Dips":"Chest","Cable Fly":"Chest",
  "Deadlift":"Back","Barbell Row":"Back","Pull-ups":"Back","Lat Pulldown":"Back",
  "Squat":"Legs","Leg Press":"Legs","Romanian Deadlift":"Legs",
  "Overhead Press":"Shoulders","Face Pull":"Shoulders",
  "Bicep Curl":"Biceps","Tricep Pushdown":"Triceps",
};
const SK_CUSTOM = "ironlog-custom-exercises";
function loadCustomExercises(){try{const v=localStorage.getItem(SK_CUSTOM);return v?JSON.parse(v):[];}catch{return[];}}
function saveCustomExercises(list){try{localStorage.setItem(SK_CUSTOM,JSON.stringify(list));}catch{}}

const TYPE_COLOR = {
  "Bench Press":C.fire,"Incline Bench":C.fire,"Dips":C.fire,"Cable Fly":C.fire,
  "Deadlift":C.red,"Barbell Row":C.green,"Pull-ups":C.green,"Lat Pulldown":C.green,
  "Squat":C.gold,"Leg Press":C.gold,"Romanian Deadlift":C.gold,
  "Overhead Press":C.blue,"Face Pull":C.blue,
  "Bicep Curl":C.blue,"Tricep Pushdown":"#38BDF8",
  "Running":"#A78BFA","Cycling":"#60A5FA","Swimming":"#34D399",
  "Rowing":"#5B9CF6","Walking":"#86EFAC","HIIT":C.red,"Other":C.iron,
};
function getColor(ex){return TYPE_COLOR[ex]||"#A78BFA";}

const MUSCLE_GROUPS = ["Full Body","Chest","Back","Legs","Shoulders","Biceps","Triceps","Core","Push","Pull","Upper","Lower"];
const GROUP_COLOR = {
  "Full Body":C.fire,"Chest":C.fire,"Back":C.green,"Legs":C.gold,
  "Shoulders":C.blue,"Biceps":C.blue,"Triceps":"#38BDF8","Core":"#F472B6",
  "Push":C.fire,"Pull":C.green,"Upper":"#A78BFA","Lower":C.gold,
};

const SK_W = "ironlog-workouts", SK_G = "ironlog-goals", SK_BW = "ironlog-bodyweight";
function load(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

function daysAgo(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().split("T")[0];}
function today(){return new Date().toISOString().split("T")[0];}

const SAMPLE_WORKOUTS=[
  {id:1,category:"lift",date:today(),duration:55,notes:"Chest day",
   sets:[{exercise:"Bench Press",reps:8,weight:225},{exercise:"Bench Press",reps:6,weight:235},{exercise:"Incline Bench",reps:10,weight:175},{exercise:"Cable Fly",reps:12,weight:65}]},
  {id:2,category:"lift",date:today(),duration:60,notes:"Leg day",
   sets:[{exercise:"Squat",reps:5,weight:315},{exercise:"Squat",reps:5,weight:315},{exercise:"Leg Press",reps:12,weight:450},{exercise:"Romanian Deadlift",reps:10,weight:200}]},
  {id:3,category:"lift",date:daysAgo(2),duration:65,notes:"Back felt strong",
   sets:[{exercise:"Deadlift",reps:5,weight:355},{exercise:"Barbell Row",reps:8,weight:200},{exercise:"Pull-ups",reps:10,weight:0},{exercise:"Lat Pulldown",reps:12,weight:155}]},
  {id:4,category:"cardio",date:daysAgo(3),duration:30,cardioType:"Running",distance:3.1,notes:"Easy 5k"},
  {id:5,category:"lift",date:daysAgo(4),duration:50,notes:"Shoulder day",
   sets:[{exercise:"Overhead Press",reps:8,weight:145},{exercise:"Overhead Press",reps:6,weight:155},{exercise:"Face Pull",reps:15,weight:55},{exercise:"Dips",reps:12,weight:0}]},
  {id:6,category:"lift",date:daysAgo(7),duration:55,notes:"Pull day",
   sets:[{exercise:"Deadlift",reps:5,weight:340},{exercise:"Barbell Row",reps:8,weight:185}]},
];
const SAMPLE_GOALS=[
  {id:1,type:"lift_pr",exercise:"Bench Press",target:275,unit:"lbs",label:"Bench 275 lbs"},
  {id:2,type:"lift_pr",exercise:"Squat",target:365,unit:"lbs",label:"Squat 365 lbs"},
  {id:3,type:"lift_pr",exercise:"Deadlift",target:405,unit:"lbs",label:"Deadlift 405 lbs"},
  {id:4,type:"sessions",exercise:"",target:16,unit:"sessions/month",label:"16 sessions this month"},
];

function calcPRs(workouts){
  const prs={};
  workouts.forEach(w=>{
    if(w.category!=="lift")return;
    (w.sets||[]).forEach(s=>{
      const e1rm=s.weight*(1+s.reps/30);
      if(!prs[s.exercise]||e1rm>prs[s.exercise].e1rm)
        prs[s.exercise]={weight:s.weight,reps:s.reps,e1rm:Math.round(e1rm),date:w.date};
    });
  });
  return prs;
}
function prTimeline(workouts,exercise){
  // Returns every moment a new all-time-best e1RM was set for this exercise, in chronological order
  const lifts=workouts.filter(w=>w.category==="lift").sort((a,b)=>a.date.localeCompare(b.date));
  const milestones=[];
  let bestE1rm=0;
  lifts.forEach(w=>{
    (w.sets||[]).forEach(s=>{
      if(s.exercise!==exercise)return;
      const e1rm=s.weight*(1+s.reps/30);
      if(e1rm>bestE1rm){
        bestE1rm=e1rm;
        milestones.push({date:w.date,weight:s.weight,reps:s.reps,e1rm:Math.round(e1rm)});
      }
    });
  });
  return milestones;
}
function maxWeightByDate(workouts,exercise){
  const map={};
  workouts.forEach(w=>{
    if(w.category!=="lift")return;
    (w.sets||[]).forEach(s=>{
      if(s.exercise!==exercise)return;
      if(!map[w.date]||s.weight>map[w.date])map[w.date]=s.weight;
    });
  });
  return Object.entries(map).sort(([a],[b])=>a.localeCompare(b)).slice(-12);
}
function volumeByDate(workouts,exercise){
  const map={};
  workouts.forEach(w=>{
    if(w.category!=="lift")return;
    (w.sets||[]).forEach(s=>{
      if(s.exercise!==exercise)return;
      map[w.date]=(map[w.date]||0)+s.weight*s.reps;
    });
  });
  return Object.entries(map).sort(([a],[b])=>a.localeCompare(b)).slice(-12);
}
function sessionsThisMonth(workouts){
  const now=new Date();
  return workouts.filter(w=>{
    const d=new Date(w.date+"T00:00:00");
    return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  }).length;
}
function calcStreak(workouts){
  const dates=new Set(workouts.map(w=>w.date));
  let streak=0;
  let cursor=new Date();
  // If no workout today yet, still allow streak to count from yesterday backward
  let ds=cursor.toISOString().split("T")[0];
  if(!dates.has(ds)){
    cursor.setDate(cursor.getDate()-1);
    ds=cursor.toISOString().split("T")[0];
  }
  while(dates.has(ds)){
    streak++;
    cursor.setDate(cursor.getDate()-1);
    ds=cursor.toISOString().split("T")[0];
  }
  return streak;
}
function fmtDate(str){return new Date(str+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});}

function BarChart({data,color,yLabel}){
  if(!data.length)return <div style={{color:C.iron,fontSize:13,padding:"20px 0"}}>No data yet — log some sessions first.</div>;
  const max=Math.max(...data.map(([,v])=>v));
  return(
    <div>
      <div style={{display:"flex",alignItems:"flex-end",gap:5,height:108,marginBottom:6}}>
        {data.map(([date,val],i)=>(
          <div key={i} title={`${fmtDate(date)}: ${val}${yLabel}`}
            style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",height:"100%"}}>
            <div style={{fontSize:10,fontWeight:700,color:i===data.length-1?color:C.iron,marginBottom:3,whiteSpace:"nowrap"}}>
              {val}
            </div>
            <div style={{width:"100%",height:`${Math.max(5,(val/max)*82)}px`,background:color,borderRadius:"3px 3px 0 0",opacity:i===data.length-1?1:0.5,transition:"height 0.4s ease"}}/>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:5}}>
        {data.map(([date],i)=>(
          <div key={i} style={{flex:1,fontSize:9,color:C.steel,textAlign:"center"}}>
            {(i===0||i===data.length-1)?fmtDate(date):""}
          </div>
        ))}
      </div>
    </div>
  );
}

const inp={background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",color:C.chalk,fontSize:16,width:"100%",boxSizing:"border-box",fontFamily:"inherit",outline:"none"};
const lbl={fontSize:10,color:C.iron,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",display:"block",marginBottom:5};
const btn=(bg,fg,extra={})=>({background:bg,color:fg,border:"none",borderRadius:9,padding:"10px 18px",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit",...extra});

function SaveBadge({status}){
  if(status==="idle")return null;
  return <span style={{fontSize:11,color:status==="saved"?C.green:C.iron,fontWeight:600}}>{status==="saving"?"Saving…":"✓ Saved"}</span>;
}

function App(){
  const [themeName,setThemeName]=useState(()=>{
    const saved=load("ironlog-theme","dark");
    applyTheme(saved);
    return saved;
  });
  function toggleTheme(){
    const next=themeName==="dark"?"light":"dark";
    applyTheme(next);
    save("ironlog-theme",next);
    setThemeName(next);
  }

  const [workouts,setWorkoutsRaw]=useState(()=>load(SK_W,SAMPLE_WORKOUTS));
  const [goals,setGoalsRaw]=useState(()=>load(SK_G,SAMPLE_GOALS));
  const [bodyweight,setBodyweightRaw]=useState(()=>load(SK_BW,[]));
  const [saveStatus,setSaveStatus]=useState("idle");

  const setWorkouts=useCallback((updater)=>{
    setWorkoutsRaw(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      setSaveStatus("saving");save(SK_W,next);
      setTimeout(()=>setSaveStatus("saved"),300);
      setTimeout(()=>setSaveStatus("idle"),2200);
      return next;
    });
  },[]);
  const setGoals=useCallback((updater)=>{
    setGoalsRaw(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      setSaveStatus("saving");save(SK_G,next);
      setTimeout(()=>setSaveStatus("saved"),300);
      setTimeout(()=>setSaveStatus("idle"),2200);
      return next;
    });
  },[]);
  const setBodyweight=useCallback((updater)=>{
    setBodyweightRaw(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      setSaveStatus("saving");save(SK_BW,next);
      setTimeout(()=>setSaveStatus("saved"),300);
      setTimeout(()=>setSaveStatus("idle"),2200);
      return next;
    });
  },[]);

  const [customExercises,setCustomExercisesRaw]=useState(()=>loadCustomExercises());
  const [tab,setTab]=useState("log");
  const [modal,setModal]=useState(null);
  const [editId,setEditId]=useState(null);
  const [wCat,setWCat]=useState("lift");
  const [wMuscleGroup,setWMuscleGroup]=useState([]);
  const [wDate,setWDate]=useState(today());
  const [wDuration,setWDuration]=useState("");
  const [wNotes,setWNotes]=useState("");
  const [wSets,setWSets]=useState([{exercise:"Bench Press",reps:"",weight:"",customName:""}]);
  const [wCardioType,setWCardioType]=useState("Running");
  const [wDistance,setWDistance]=useState("");
  const [gType,setGType]=useState("lift_pr");
  const [gExercise,setGExercise]=useState("Bench Press");
  const [gExerciseCustom,setGExerciseCustom]=useState("");
  const [gTarget,setGTarget]=useState("");
  const [gTargetReps,setGTargetReps]=useState("");
  const [gLabel,setGLabel]=useState("");
  const [gStartWeight,setGStartWeight]=useState("");
  const [bwDate,setBwDate]=useState(today());
  const [bwValue,setBwValue]=useState("");
  const [importStatus,setImportStatus]=useState(null);
  const [chartExercise,setChartExercise]=useState("Bench Press");
  const [prSearch,setPrSearch]=useState("");
  const [timelineExercise,setTimelineExercise]=useState(null);
  const [confirmDelete,setConfirmDelete]=useState(null);
  const [logGroupFilter,setLogGroupFilter]=useState("All");
  const [chartMode,setChartMode]=useState("weight");
  const [prCelebration,setPrCelebration]=useState(null);

  // All exercises = base + saved custom ones
  const allExercises=useMemo(()=>({...BASE_LIFT_MUSCLES,...Object.fromEntries(customExercises.map(e=>[e,"Custom"]))}),[customExercises]);
  const LIFT_EXERCISES=useMemo(()=>Object.keys(allExercises),[allExercises]);

  function addCustomExercise(name){
    const trimmed=name.trim();
    if(!trimmed||customExercises.includes(trimmed)||BASE_LIFT_MUSCLES[trimmed])return;
    const updated=[...customExercises,trimmed];
    setCustomExercisesRaw(updated);
    saveCustomExercises(updated);
  }
  function removeCustomExercise(name){
    const updated=customExercises.filter(e=>e!==name);
    setCustomExercisesRaw(updated);
    saveCustomExercises(updated);
  }

  const prs=useMemo(()=>calcPRs(workouts),[workouts]);
  const sortedWorkouts=useMemo(()=>[...workouts].sort((a,b)=>b.date.localeCompare(a.date)),[workouts]);
  const streak=useMemo(()=>calcStreak(workouts),[workouts]);

  function openRepeat(sourceWorkout){
    if(!sourceWorkout)return;
    setEditId(null);
    setWCat("lift");
    setWDate(today());
    setWMuscleGroup(Array.isArray(sourceWorkout.muscleGroup)?sourceWorkout.muscleGroup:(sourceWorkout.muscleGroup?[sourceWorkout.muscleGroup]:[]));
    setWDuration("");
    setWNotes("");
    setWSets(sourceWorkout.sets.map(s=>({exercise:s.exercise,reps:String(s.reps),weight:String(s.weight),customName:""})));
    setModal("addWorkout");
  }

  function openAdd(ew=null){
    if(ew){
      setEditId(ew.id);setWCat(ew.category);setWDate(ew.date);
      setWMuscleGroup(ew.muscleGroup?(Array.isArray(ew.muscleGroup)?ew.muscleGroup:[ew.muscleGroup]):[]);
      setWDuration(String(ew.duration||""));setWNotes(ew.notes||"");
      if(ew.category==="lift"){setWSets(ew.sets.map(s=>({...s,reps:String(s.reps),weight:String(s.weight),customName:""})));}
      else{setWCardioType(ew.cardioType||"Running");setWDistance(String(ew.distance||""));}
    }else{
      setEditId(null);setWCat("lift");setWDate(today());
      setWMuscleGroup([]);setWDuration("");setWNotes("");
      setWSets([{exercise:"Bench Press",reps:"",weight:"",customName:""}]);
      setWCardioType("Running");setWDistance("");
    }
    setModal("addWorkout");
  }

  function saveWorkout(){
    const base={date:wDate,duration:Number(wDuration)||0,notes:wNotes,category:wCat,muscleGroup:wMuscleGroup};
    let w;
    if(wCat==="lift"){
      const cs=wSets.filter(s=>s.reps&&s.weight!=="").map(s=>{
        const exName=s.exercise==="__custom__"?(s.customName.trim()||"Custom"):s.exercise;
        if(s.exercise==="__custom__"&&s.customName.trim())addCustomExercise(s.customName.trim());
        return{exercise:exName,reps:Number(s.reps),weight:Number(s.weight)};
      });
      if(!cs.length)return;
      w={...base,sets:cs};

      // Check for new PRs before committing (compare against current prs state)
      const newPRs=[];
      cs.forEach(s=>{
        const e1rm=s.weight*(1+s.reps/30);
        const existingPR=prs[s.exercise];
        if(!existingPR||e1rm>existingPR.e1rm){
          // Avoid duplicate celebration if multiple sets of same exercise beat PR — keep the best
          const already=newPRs.find(p=>p.exercise===s.exercise);
          if(!already||e1rm>already.e1rm){
            const filtered=newPRs.filter(p=>p.exercise!==s.exercise);
            filtered.push({exercise:s.exercise,weight:s.weight,reps:s.reps,e1rm:Math.round(e1rm),prevWeight:existingPR?existingPR.weight:0});
            newPRs.length=0;newPRs.push(...filtered);
          }
        }
      });

      if(editId){
        setWorkouts(ws=>ws.map(x=>x.id===editId?{...w,id:editId}:x));
      } else {
        setWorkouts(ws=>{
          const existing=ws.find(x=>x.category==="lift"&&x.date===wDate);
          if(existing){
            const mergedNotes=[existing.notes,w.notes].filter(Boolean).join(" · ");
            const existingGroups=Array.isArray(existing.muscleGroup)?existing.muscleGroup:(existing.muscleGroup?[existing.muscleGroup]:[]);
            const newGroups=Array.isArray(w.muscleGroup)?w.muscleGroup:(w.muscleGroup?[w.muscleGroup]:[]);
            const mergedGroup=[...new Set([...existingGroups,...newGroups])];
            return ws.map(x=>x.id===existing.id?{...existing,sets:[...existing.sets,...w.sets],duration:(existing.duration||0)+(w.duration||0),notes:mergedNotes,muscleGroup:mergedGroup}:x);
          }
          return [{...w,id:Date.now()},...ws];
        });
      }

      if(newPRs.length>0){
        setPrCelebration(newPRs[0]);
        setTimeout(()=>setPrCelebration(null),4500);
      }
    } else {
      w={...base,cardioType:wCardioType,distance:Number(wDistance)||0};
      if(editId){setWorkouts(ws=>ws.map(x=>x.id===editId?{...w,id:editId}:x));}
      else{setWorkouts(ws=>[{...w,id:Date.now()},...ws]);}
    }
    setModal(null);
  }

  function deleteWorkout(id){setWorkouts(ws=>ws.filter(w=>w.id!==id));}
  function askDelete(message,onConfirm){
    setConfirmDelete({message,onConfirm});
  }
  function saveGoal(){
    if(!gLabel||!gTarget)return;
    const resolvedExercise=gExercise==="__custom__"?(gExerciseCustom.trim()||"Custom"):gExercise;
    const unit=gType==="lift_pr"?"lbs":gType==="sessions"?"sessions/month":gType==="bodyweight_loss"?"lbs lost":"lbs gained";
    setGoals(gs=>[...gs,{id:Date.now(),type:gType,exercise:gType==="lift_pr"?resolvedExercise:"",target:Number(gTarget),targetReps:gType==="lift_pr"?(Number(gTargetReps)||1):0,startWeight:gType.startsWith("bodyweight")?Number(gStartWeight)||0:0,label:gLabel,unit}]);
    setGLabel("");setGTarget("");setGTargetReps("");setGStartWeight("");setGExerciseCustom("");setModal(null);
  }
  function logBodyweight(){
    if(!bwValue)return;
    const entry={date:bwDate,weight:Number(bwValue),id:Date.now()};
    setBodyweight(bw=>{
      const filtered=bw.filter(e=>e.date!==bwDate);
      return [...filtered,entry].sort((a,b)=>b.date.localeCompare(a.date));
    });
    setBwValue("");
  }

  function exportBackup(){
    const backup={
      app:"IronLog",
      version:1,
      exportedAt:new Date().toISOString(),
      workouts,
      goals,
      bodyweight,
      customExercises,
      theme:themeName,
    };
    const blob=new Blob([JSON.stringify(backup,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    const dateStr=today();
    a.href=url;
    a.download=`ironlog-backup-${dateStr}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importBackup(file){
    const reader=new FileReader();
    reader.onload=(e)=>{
      try{
        const data=JSON.parse(e.target.result);
        if(!data||typeof data!=="object")throw new Error("Invalid file");
        if(Array.isArray(data.workouts))setWorkouts(data.workouts);
        if(Array.isArray(data.goals))setGoals(data.goals);
        if(Array.isArray(data.bodyweight))setBodyweight(data.bodyweight);
        if(Array.isArray(data.customExercises)){
          setCustomExercisesRaw(data.customExercises);
          saveCustomExercises(data.customExercises);
        }
        if(data.theme==="light"||data.theme==="dark"){
          applyTheme(data.theme);
          save("ironlog-theme",data.theme);
          setThemeName(data.theme);
        }
        setImportStatus({type:"success",message:"Backup restored successfully!"});
      }catch(err){
        setImportStatus({type:"error",message:"Couldn't read that file. Make sure it's a valid Iron Log backup."});
      }
      setTimeout(()=>setImportStatus(null),4000);
    };
    reader.readAsText(file);
  }
  function deleteGoal(id){setGoals(gs=>gs.filter(g=>g.id!==id));}
  function goalProgress(g){
    if(g.type==="lift_pr"){
      const pr=prs[g.exercise];
      const targetReps=g.targetReps||1;
      const targetE1rm=g.target*(1+targetReps/30);
      const curE1rm=pr?pr.e1rm:0;
      const cur=pr?pr.weight:0;
      const curReps=pr?pr.reps:0;
      // Only "achieved" if an actual logged set meets or beats both the target weight AND target reps
      const achieved=cur>=g.target&&curReps>=targetReps;
      const pct=achieved?100:Math.min(99,Math.round((curE1rm/targetE1rm)*100));
      return{current:cur,currentReps:curReps,pct,achieved};
    }
    if(g.type==="sessions"){
      const cur=sessionsThisMonth(workouts);
      return{current:cur,pct:Math.min(100,Math.round((cur/g.target)*100)),achieved:cur>=g.target};
    }
    if(g.type==="bodyweight_loss"||g.type==="bodyweight_gain"){
      const latestBW=bodyweight[0];
      const cur=latestBW?latestBW.weight:0;
      const start=g.startWeight||cur;
      if(g.type==="bodyweight_loss"){
        const needed=start-g.target;
        const done=needed>0?Math.max(0,start-cur):0;
        const pct=Math.min(100,needed>0?Math.round((done/needed)*100):0);
        return{current:cur,pct,achieved:cur<=g.target};
      } else {
        const needed=g.target-start;
        const done=needed>0?Math.max(0,cur-start):0;
        const pct=Math.min(100,needed>0?Math.round((done/needed)*100):0);
        return{current:cur,pct,achieved:cur>=g.target};
      }
    }
    return{current:0,pct:0,achieved:false};
  }

  const chartData=chartMode==="weight"?maxWeightByDate(workouts,chartExercise):volumeByDate(workouts,chartExercise);
  const topPRs=Object.entries(prs).filter(([ex])=>LIFT_EXERCISES.includes(ex)).sort((a,b)=>b[1].e1rm-a[1].e1rm);
  const weekDays=Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(6-i));
    const ds=d.toISOString().split("T")[0];
    return{ds,day:["Su","Mo","Tu","We","Th","Fr","Sa"][d.getDay()],active:workouts.some(w=>w.date===ds)};
  });

  return(
    <div style={{minHeight:"100dvh",background:C.bg,color:C.chalk,fontFamily:"'Inter',system-ui,sans-serif",WebkitFontSmoothing:"antialiased"}}>

      {/* PR CELEBRATION BANNER */}
      {prCelebration&&(
        <div onClick={()=>setPrCelebration(null)} style={{
          position:"fixed",top:0,left:0,right:0,zIndex:200,
          display:"flex",justifyContent:"center",
          padding:"env(safe-area-inset-top,16px) 16px 0",
          pointerEvents:"none",
        }}>
          <div style={{
            marginTop:10,maxWidth:560,width:"100%",
            background:`linear-gradient(135deg, ${C.goldDim}, ${C.fireDim})`,
            border:`1px solid ${C.gold}`,borderRadius:16,
            padding:"16px 20px",boxShadow:"0 8px 30px rgba(255,184,0,0.25)",
            display:"flex",alignItems:"center",gap:14,
            animation:"prSlideIn 0.4s cubic-bezier(0.34,1.56,0.64,1)",
          }}>
            <div style={{fontSize:32,lineHeight:1}}>🏆</div>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:800,color:C.gold,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:2}}>New Personal Record!</div>
              <div style={{fontSize:15,fontWeight:700,color:C.chalk}}>{prCelebration.exercise} — {prCelebration.weight} lbs</div>
              {prCelebration.prevWeight>0&&(
                <div style={{fontSize:12,color:C.iron,marginTop:2}}>Previous best: {prCelebration.prevWeight} lbs (+{prCelebration.weight-prCelebration.prevWeight} lbs)</div>
              )}
            </div>
          </div>
        </div>
      )}
      <style>{`@keyframes prSlideIn{from{opacity:0;transform:translateY(-20px) scale(0.95);}to{opacity:1;transform:translateY(0) scale(1);}}`}</style>

      {/* HEADER */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"16px 20px 0",position:"sticky",top:0,zIndex:50}}>
        <div style={{maxWidth:600,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,paddingTop:8}}>
            <div>
              <div style={{fontSize:10,letterSpacing:"0.2em",color:C.fire,fontWeight:800,textTransform:"uppercase"}}>IRON LOG</div>
              <div style={{display:"flex",alignItems:"baseline",gap:10}}>
                <div style={{fontSize:22,fontWeight:800,letterSpacing:"-0.03em",lineHeight:1.1}}>Training Tracker</div>
                {streak>0&&(
                  <div style={{display:"flex",alignItems:"center",gap:3,background:C.fireDim,borderRadius:8,padding:"2px 8px"}}>
                    <span style={{fontSize:13}}>🔥</span>
                    <span style={{fontSize:13,fontWeight:800,color:C.fire}}>{streak}</span>
                  </div>
                )}
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <SaveBadge status={saveStatus}/>
              <button onClick={()=>setModal("settings")} title="Settings" style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:16,flexShrink:0}}>
                ⚙️
              </button>
              <button onClick={()=>openAdd()} style={btn(C.fire,C.bg,{fontSize:13,padding:"9px 16px",borderRadius:10})}>+ Log Session</button>
            </div>
          </div>
          <div style={{display:"flex",gap:5,marginBottom:12}}>
            {weekDays.map(({ds,day,active})=>(
              <div key={ds} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                <div style={{width:30,height:30,borderRadius:7,background:active?C.fire:C.card,border:`1px solid ${active?C.fire:C.border}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {active&&<div style={{width:7,height:7,borderRadius:"50%",background:C.bg}}/>}
                </div>
                <div style={{fontSize:9,color:active?C.fire:C.steel,fontWeight:active?700:400}}>{day}</div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",overflowX:"auto"}}>
            {[["log","Log"],["records","PRs"],["charts","Charts"],["goals","Goals"],["bodyweight","Weight"]].map(([key,label])=>(
              <button key={key} onClick={()=>setTab(key)}
                style={{background:"none",border:"none",color:tab===key?C.fire:C.iron,fontWeight:tab===key?700:500,fontSize:13,padding:"8px 11px",cursor:"pointer",borderBottom:`2px solid ${tab===key?C.fire:"transparent"}`,transition:"all 0.15s",fontFamily:"inherit",whiteSpace:"nowrap",flexShrink:0}}>
                {label}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:600,margin:"0 auto",padding:"20px 16px 100px"}}>

        {/* LOG TAB */}
        {tab==="log"&&(
          <div>
            <div style={{display:"flex",gap:10,marginBottom:24}}>
              {[
                {label:"Streak",value:streak,unit:streak===1?"day":"days",color:C.fire,icon:"🔥"},
                {label:"This Month",value:sessionsThisMonth(workouts),unit:"sessions",color:C.fire},
              ].map(({label,value,unit,color,icon})=>(
                <div key={label} style={{flex:1,background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 12px"}}>

                  <div style={{fontSize:22,fontWeight:800,color,lineHeight:1}}>{value}<span style={{fontSize:11,color:C.iron,fontWeight:500,marginLeft:3}}>{unit}</span></div>

            </div>

            {(()=>{

                  display:"flex",alignItems:"center",gap:14,fontFamily:"inherit",

                  <div style={{width:38,height:38,borderRadius:10,background:C.fireDim,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:18}}>🔁</div>

                    <div style={{fontSize:13,fontWeight:700,color:C.chalk,marginBottom:2}}>Repeat a Past Session</div>
                    <div style={{fontSize:12,color:C.iron,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      Last: {groups.length>0?groups.join(", ")+" · ":""}{exNames.slice(0,3).join(", ")}{exNames.length>3?` +${exNames.length-3} more`:""}
                    </div>
                  </div>
                  <div style={{color:C.fire,fontSize:13,fontWeight:700,flexShrink:0}}>Choose →</div>
                </button>

            })()}
            {sortedWorkouts.length===0&&(
              <div style={{textAlign:"center",padding:"60px 0",color:C.iron}}>
                <div style={{fontSize:40,marginBottom:12}}>🏋️</div>
                <div style={{fontSize:16,fontWeight:700}}>No sessions yet</div>
                <div style={{fontSize:13,marginTop:6}}>Tap "+ Log Session" to get started</div>
              </div>
            )}
            {sortedWorkouts.length>0&&(()=>{
              const filteredWorkouts=logGroupFilter==="All"?sortedWorkouts:sortedWorkouts.filter(w=>{
                if(w.category!=="lift")return false;
                const gs=Array.isArray(w.muscleGroup)?w.muscleGroup:(w.muscleGroup?[w.muscleGroup]:[]);
                return gs.includes(logGroupFilter);
              });
              if(filteredWorkouts.length===0){
                return(
                  <div style={{textAlign:"center",padding:"60px 0",color:C.iron}}>
                    <div style={{fontSize:40,marginBottom:12}}>🏋️</div>
                    <div style={{fontSize:16,fontWeight:700}}>No {logGroupFilter} sessions yet</div>

                  </div>
                );
              }
              const byDate={};
              filteredWorkouts.forEach(w=>{
                if(!byDate[w.date])byDate[w.date]=[];
                byDate[w.date].push(w);
              });
              const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
              return dates.map((date)=>{
                const dayWorkouts=byDate[date];
                const liftEntry=dayWorkouts.find(w=>w.category==="lift");
                const cardioEntries=dayWorkouts.filter(w=>w.category==="cardio");
                const allSets=liftEntry?(liftEntry.sets||[]):[];
                const setsByExercise={};
                allSets.forEach(s=>{
                  if(!setsByExercise[s.exercise])setsByExercise[s.exercise]=[];
                  setsByExercise[s.exercise].push(s);
                });
                const totalVol=allSets.reduce((sum,s)=>sum+s.weight*s.reps,0);
                return(
                  <div key={date} style={{marginBottom:24}}>
                    <div style={{fontSize:10,color:C.iron,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:10}}>
                      {date===today()?"Today":fmtDate(date)}
                    </div>

                    {/* Single merged lift card */}
                    {liftEntry&&(
                      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,marginBottom:10}}>
                        <div style={{padding:"14px 16px 0"}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                            <div>
                              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                                <div style={{fontSize:11,fontWeight:700,color:C.fire,letterSpacing:"0.1em",textTransform:"uppercase"}}>Weightlifting</div>
                                {(Array.isArray(liftEntry.muscleGroup)?liftEntry.muscleGroup:(liftEntry.muscleGroup?[liftEntry.muscleGroup]:[])).map(g=>(
                                  <div key={g} style={{fontSize:11,fontWeight:700,color:GROUP_COLOR[g]||C.iron,background:(GROUP_COLOR[g]||C.iron)+"22",borderRadius:6,padding:"2px 8px",letterSpacing:"0.06em"}}>
                                    {g}
                                  </div>
                                ))}
                                {liftEntry.duration>0&&<div style={{fontSize:11,color:C.iron}}>{liftEntry.duration} min</div>}
                              </div>
                              <div style={{display:"flex",gap:16}}>
                                <span style={{fontSize:13,color:C.iron}}><span style={{color:C.chalk,fontWeight:600}}>{allSets.length}</span> sets</span>
                                <span style={{fontSize:13,color:C.iron}}><span style={{color:C.gold,fontWeight:600}}>{totalVol.toLocaleString()}</span> lbs vol</span>
                              </div>
                              {liftEntry.notes&&<div style={{fontSize:12,color:C.iron,marginTop:6,fontStyle:"italic"}}>{liftEntry.notes}</div>}
                            </div>
                            <div style={{display:"flex",gap:4}}>
                              <button onClick={()=>openAdd(liftEntry)} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:7,color:C.iron,cursor:"pointer",padding:"5px 9px",fontSize:12}}>Edit</button>
                              <button onClick={()=>askDelete("Delete this weightlifting session? This removes all sets logged for this day.",()=>deleteWorkout(liftEntry.id))} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:7,color:C.iron,cursor:"pointer",padding:"5px 9px",fontSize:12}}>✕</button>
                            </div>
                          </div>
                        </div>
                        {/* Sets grouped by exercise */}
                        <div style={{margin:"10px 16px 14px",background:C.card,borderRadius:10,padding:"12px"}}>
                          {Object.entries(setsByExercise).map(([ex,sets],ei,arr)=>(
                            <div key={ex} style={{marginBottom:ei<arr.length-1?12:0}}>
                              <div style={{fontSize:11,fontWeight:700,color:getColor(ex),marginBottom:5,letterSpacing:"0.04em"}}>{ex}</div>
                              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                                {sets.map((s,si)=>(
                                  <div key={si} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 10px",fontSize:12,color:C.iron}}>
                                    {s.reps}×<span style={{color:C.chalk,fontWeight:700,marginLeft:2}}>{s.weight>0?s.weight+"lbs":"BW"}</span>
                                  </div>
                                ))}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}

                    {/* Cardio entries */}
                    {cardioEntries.map(w=>(
                      <div key={w.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,marginBottom:10}}>
                        <div style={{padding:"14px 16px"}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                            <div>
                              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                                <div style={{fontSize:11,fontWeight:700,color:"#A78BFA",letterSpacing:"0.1em",textTransform:"uppercase"}}>{w.cardioType}</div>
                                {w.duration>0&&<div style={{fontSize:11,color:C.iron}}>{w.duration} min</div>}
                              </div>
                              {w.distance>0&&<span style={{fontSize:13,color:C.iron}}><span style={{color:C.chalk,fontWeight:600}}>{w.distance}</span> mi</span>}
                              {w.notes&&<div style={{fontSize:12,color:C.iron,marginTop:6,fontStyle:"italic"}}>{w.notes}</div>}
                            </div>
                            <div style={{display:"flex",gap:4}}>
                              <button onClick={()=>openAdd(w)} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:7,color:C.iron,cursor:"pointer",padding:"5px 9px",fontSize:12}}>Edit</button>
                              <button onClick={()=>askDelete(`Delete this ${w.cardioType} session?`,()=>deleteWorkout(w.id))} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:7,color:C.iron,cursor:"pointer",padding:"5px 9px",fontSize:12}}>✕</button>
                            </div>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                );
              });
            })()}
          </div>
        )}

        {/* PRs TAB */}
        {tab==="records"&&(
          <div>
            <div style={{marginBottom:16}}>
              <input
                type="text"
                placeholder="🔍 Search exercises…"
                value={prSearch}
                onChange={e=>setPrSearch(e.target.value)}
                style={inp}
              />
            </div>
            <div style={{fontSize:10,color:C.iron,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:12}}>All Exercises</div>
            {topPRs.filter(([ex])=>ex.toLowerCase().includes(prSearch.trim().toLowerCase())).map(([ex,pr])=>{
              const matchingGoal=goals.find(g=>g.type==="lift_pr"&&g.exercise===ex);
              const gp=matchingGoal?goalProgress(matchingGoal):null;
              const goalDone=gp&&gp.achieved;
              return(
                <button key={ex} onClick={()=>setTimelineExercise(ex)} style={{display:"block",width:"100%",textAlign:"left",background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 16px",marginBottom:8,cursor:"pointer",fontFamily:"inherit"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontSize:14,fontWeight:700,color:getColor(ex)}}>{ex}</div>
                      <div style={{fontSize:11,color:C.iron,marginTop:2}}>{allExercises[ex]||"Custom"} · {fmtDate(pr.date)}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:18,fontWeight:800,color:C.gold}}>{pr.weight}<span style={{fontSize:11,color:C.iron,marginLeft:2}}>lbs</span></div>
                      <div style={{fontSize:11,color:C.iron}}>{pr.reps} reps · e1RM {pr.e1rm} lbs</div>
                    </div>
                  </div>
                  {matchingGoal&&(
                    <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}`}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                        <div style={{fontSize:11,color:C.iron}}>
                          {goalDone?"🏆 ":""}Goal: {matchingGoal.target} lbs × {matchingGoal.targetReps||1} reps
                        </div>
                        <div style={{fontSize:12,fontWeight:800,color:goalDone?C.green:C.fire}}>{gp.pct}%</div>
                      </div>
                      <div style={{background:C.card,borderRadius:4,height:5,overflow:"hidden"}}>
                        <div style={{background:goalDone?C.green:C.fire,width:`${gp.pct}%`,height:"100%",borderRadius:4,transition:"width 0.6s ease"}}/>
                      </div>
                    </div>
                  )}
                  <div style={{marginTop:8,fontSize:11,color:C.steel}}>📈 Tap to view PR timeline</div>
                </button>
              );
            })}
            {topPRs.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:C.iron,fontSize:13}}>Log weightlifting sessions to see your PRs</div>}
            {topPRs.length>0&&topPRs.filter(([ex])=>ex.toLowerCase().includes(prSearch.trim().toLowerCase())).length===0&&(
              <div style={{textAlign:"center",padding:"40px 0",color:C.iron,fontSize:13}}>No exercises match "{prSearch}"</div>
            )}
          </div>
        )}

        {/* CHARTS TAB */}
        {tab==="charts"&&(
          <div>
            <div style={{marginBottom:16}}>
              <div style={lbl}>Exercise</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {LIFT_EXERCISES.filter(ex=>workouts.some(w=>w.category==="lift"&&(w.sets||[]).some(s=>s.exercise===ex))).map(ex=>(
                  <button key={ex} onClick={()=>setChartExercise(ex)}
                    style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${chartExercise===ex?getColor(ex):C.border}`,background:chartExercise===ex?getColor(ex)+"22":"transparent",color:chartExercise===ex?getColor(ex):C.iron,fontWeight:chartExercise===ex?700:500,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
                    {ex}
                  </button>
                ))}
              </div>
            </div>
            <div style={{display:"flex",gap:6,marginBottom:16}}>
              {[["weight","Max Weight"],["volume","Volume"]].map(([m,label])=>(
                <button key={m} onClick={()=>setChartMode(m)}
                  style={{padding:"6px 14px",borderRadius:8,border:`1px solid ${chartMode===m?C.fire:C.border}`,background:chartMode===m?C.fireDim:"transparent",color:chartMode===m?C.fire:C.iron,fontWeight:chartMode===m?700:500,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
                  {label}
                </button>
              ))}
            </div>
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:"18px 18px 12px",marginBottom:16}}>
              <div style={{fontSize:14,fontWeight:700,color:getColor(chartExercise),marginBottom:2}}>{chartExercise}</div>
              <div style={{fontSize:11,color:C.iron,marginBottom:14}}>{chartMode==="weight"?"Heaviest set per session (lbs)":"Total volume per session (lbs × reps)"}</div>
              <BarChart data={chartData} color={getColor(chartExercise)} yLabel=" lbs"/>
            </div>
            {prs[chartExercise]&&(
              <div style={{background:C.goldDim,border:`1px solid ${C.gold}`,borderRadius:12,padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                <div>
                  <div style={{fontSize:10,color:C.gold,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:4}}>🏆 Personal Record</div>
                  <div style={{fontSize:13,color:C.chalk}}>{prs[chartExercise].reps} reps @ {prs[chartExercise].weight} lbs · {fmtDate(prs[chartExercise].date)}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:26,fontWeight:900,color:C.gold,lineHeight:1}}>{prs[chartExercise].e1rm}</div>
                  <div style={{fontSize:10,color:C.iron}}>e1RM lbs</div>
                </div>
              </div>
            )}
            {workouts.some(w=>w.category==="cardio"&&w.distance)&&(
              <>
                <div style={{fontSize:10,color:C.iron,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:12}}>Cardio Distance</div>
                <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:"18px 18px 12px"}}>
                  <BarChart data={Object.entries(workouts.filter(w=>w.category==="cardio"&&w.distance).reduce((m,w)=>{m[w.date]=(m[w.date]||0)+w.distance;return m;},{})).sort(([a],[b])=>a.localeCompare(b)).slice(-12)} color="#A78BFA" yLabel=" mi"/>
                </div>
              </>
            )}
          </div>

                  <div style={{marginBottom:14}}>
                    <div style={lbl}>Label</div>
                    <input placeholder="Bench 275 lbs × 5 reps" value={gLabel} onChange={e=>setGLabel(e.target.value)} style={inp}/>
                  </div>
                )}
                <div style={{display:"flex",gap:10,marginTop:20}}>
                  <button onClick={saveGoal} disabled={!gTarget||!gLabel||(gType==="lift_pr"&&gExercise==="__custom__"&&!gExerciseCustom.trim())}
                    style={btn(C.fire,C.bg,{flex:1,padding:"13px",fontSize:15,opacity:(!gTarget||!gLabel)?0.4:1})}>Add Goal</button>
                  <button onClick={()=>setModal(null)} style={btn(C.card,C.iron,{padding:"13px 20px",border:`1px solid ${C.border}`})}>Cancel</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* CONFIRM DELETE DIALOG */}
      {confirmDelete&&(
        <div onClick={()=>setConfirmDelete(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div onClick={e=>e.stopPropagation()} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:18,padding:22,width:"100%",maxWidth:380}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:18}}>
              <div style={{fontSize:24,lineHeight:1}}>⚠️</div>
              <div>
                <div style={{fontSize:15,fontWeight:800,color:C.chalk,marginBottom:4}}>Delete this?</div>
                <div style={{fontSize:13,color:C.iron,lineHeight:1.5}}>{confirmDelete.message}</div>
              </div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setConfirmDelete(null)} style={btn(C.card,C.iron,{flex:1,padding:"12px",border:`1px solid ${C.border}`})}>Cancel</button>
              <button onClick={()=>{confirmDelete.onConfirm();setConfirmDelete(null);}} style={btn(C.red,"#FFFFFF",{flex:1,padding:"12px"})}>Delete</button>
            </div>
          </div>
        </div>
      )}

      {/* PR TIMELINE OVERLAY */}
      {timelineExercise&&(()=>{
        const milestones=prTimeline(workouts,timelineExercise);
        const col=getColor(timelineExercise);
        return(
          <div onClick={()=>setTimelineExercise(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
            <div onClick={e=>e.stopPropagation()} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:"20px 20px 0 0",padding:24,paddingBottom:"calc(24px + env(safe-area-inset-bottom,0px))",width:"100%",maxWidth:600,maxHeight:"90dvh",overflowY:"auto"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                <div>
                  <div style={{fontSize:10,color:C.iron,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:4}}>PR Timeline</div>
                  <div style={{fontSize:19,fontWeight:800,color:col}}>{timelineExercise}</div>
                </div>
                <button onClick={()=>setTimelineExercise(null)} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,color:C.iron,cursor:"pointer",padding:"6px 10px",fontSize:14}}>✕</button>
              </div>
              <div style={{fontSize:12,color:C.iron,marginBottom:20}}>
                {milestones.length>0?`${milestones.length} all-time PR${milestones.length===1?"":"s"} set`:"No PRs logged yet for this exercise"}
              </div>

              {milestones.length>0&&(
                <div style={{position:"relative",paddingLeft:18}}>
                  <div style={{position:"absolute",left:5,top:6,bottom:6,width:2,background:C.border}}/>
                  {[...milestones].reverse().map((m,i)=>{
                    const isCurrent=i===0;
                    const prevMilestone=milestones[milestones.length-1-i-1];
                    const gain=prevMilestone?m.e1rm-prevMilestone.e1rm:null;
                    return(
                      <div key={i} style={{position:"relative",marginBottom:i<milestones.length-1?20:0}}>
                        <div style={{position:"absolute",left:-18,top:3,width:12,height:12,borderRadius:"50%",background:isCurrent?col:C.card,border:`2px solid ${col}`}}/>
                        <div style={{background:isCurrent?col+"15":C.card,border:`1px solid ${isCurrent?col:C.border}`,borderRadius:10,padding:"10px 14px"}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:3}}>
                            <div style={{fontSize:15,fontWeight:800,color:isCurrent?col:C.chalk}}>
                              {m.weight} lbs × {m.reps} reps
                              {isCurrent&&<span style={{fontSize:11,fontWeight:700,color:C.gold,marginLeft:8}}>🏆 Current Best</span>}
                            </div>
                          </div>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                            <div style={{fontSize:11,color:C.iron}}>{fmtDate(m.date)} · e1RM {m.e1rm} lbs</div>
                            {gain!==null&&gain>0&&(
                              <div style={{fontSize:11,fontWeight:700,color:C.green}}>+{gain} e1RM</div>
                            )}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
              {milestones.length===0&&(
                <div style={{textAlign:"center",padding:"30px 0",color:C.iron,fontSize:13}}>Log a set for this exercise to start tracking PRs</div>
              )}
            </div>
          </div>
        );
      })()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
